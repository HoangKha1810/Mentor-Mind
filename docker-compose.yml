services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: mentormind-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: mentormind
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
  redis:
    image: redis:7-alpine
    container_name: mentormind-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
  judge0-server:
    image: judge0/judge0:latest
    container_name: mentormind-judge0-server
    profiles: ["judge0"]
    privileged: true
    ports:
      - "2358:2358"
    volumes:
      - ./infra/judge0/judge0.conf:/judge0.conf:ro
    depends_on:
      - judge0-db
      - judge0-redis
    restart: unless-stopped
  judge0-worker:
    image: judge0/judge0:latest
    container_name: mentormind-judge0-worker
    profiles: ["judge0"]
    command: ["./scripts/workers"]
    privileged: true
    volumes:
      - ./infra/judge0/judge0.conf:/judge0.conf:ro
    depends_on:
      - judge0-db
      - judge0-redis
    restart: unless-stopped
  judge0-db:
    image: postgres:16.2
    container_name: mentormind-judge0-db
    profiles: ["judge0"]
    env_file:
      - ./infra/judge0/judge0.conf
    volumes:
      - judge0-data:/var/lib/postgresql/data
    restart: unless-stopped
  judge0-redis:
    image: redis:7.2.4
    container_name: mentormind-judge0-redis
    profiles: ["judge0"]
    env_file:
      - ./infra/judge0/judge0.conf
    command:
      - bash
      - -c
      - docker-entrypoint.sh --appendonly no --requirepass "$$REDIS_PASSWORD"
    restart: unless-stopped
volumes:
  postgres-data:
  redis-data:
  judge0-data:
